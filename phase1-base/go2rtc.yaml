# go2rtc configuration for the robot.
#
# The single stream "camera" is fed by whichever source the supervisor has
# running (Source A video_monitor, or Source B ava_cam_relay). Both publish
# raw H264 to 127.0.0.1:6969; go2rtc connects as a TCP client and probes it.
streams:
  camera: tcp://127.0.0.1:6969

api:
  listen: ":1984"      # web UI + REST + WebRTC signaling

rtsp:
  listen: ":8554"      # rtsp://<robot-ip>:8554/camera

webrtc:
  listen: ":8555"      # low-latency WebRTC (also negotiated via :1984)

log:
  level: info
