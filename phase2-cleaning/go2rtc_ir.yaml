# go2rtc config for the Phase 2 camera feed.
# The relay serves MJPEG on loopback :8090 (RGB color on the dock, infrared while
# cleaning); go2rtc consumes it and re-serves. One stream, content auto-switches.
streams:
  camera: "http://127.0.0.1:8090/stream"

api:
  listen: ":1984"      # web UI + snapshot API (http://<ip>:1984/)

rtsp:
  listen: ":8554"      # rtsp://<ip>:8554/camera

webrtc:
  listen: ":8555"

log:
  level: info
